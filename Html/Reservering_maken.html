<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>
    <!-- Navbar -->
    <nav>
        <ul>
            <li><a href="Home.html">Home</a></li>
            <li><a href="Reservering_maken.html">Reservering maken</a></li>
            <li><a href="Reserveringen.html">Reserveringen</a></li>

            <li><a href="account.html">Accounts</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- Page heading -->
    <h1>Make a Reservation</h1>

    <!-- Reservation form -->
    <div class="reservation-form">
        <form action="#" method="post"> 
            <!-- Lokaal kiezen dropdown -->
            <label for="lokaal">Lokaal kiezen</label>
            <select id="lokaal" name="lokaal" required>
                <option value="">--Select a Lokaal--</option>
                <option value="lokaal1">Lokaal 1</option>
                <option value="lokaal2">Lokaal 2</option>
                <option value="lokaal3">Lokaal 3</option>
            </select>

            <label for="date">Reservation Date</label>
            <input type="date" id="date" name="date" required>

            <label for="time">Start Time</label>
            <input type="time" id="time" name="starttime" required>

            <label for="time">End Time</label>
            <input type="time" id="time" name="endtime" required>

            <label for="people">Number of People</label>
            <input type="number" id="people" name="people" placeholder="1" min="1" required>

            <label for="notes">Additional Notes</label>
            <textarea id="notes" name="notes" rows="4" placeholder="Any special requests"></textarea>

            <button type="submit">Reserve Now</button>
        </form>
    </div>
</body>
</html>
