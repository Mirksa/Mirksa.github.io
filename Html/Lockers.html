    <h1>Reserve a Locker</h1>

    <div class="locker-form">
        <form action="#" method="post"> 
            <label for="locker">Select Locker</label>
            <select id="locker" name="locker" required>
                <option value="">--Select a Locker--</option>
                <option value="locker1">Locker 1</option>
                <option value="locker2">Locker 2</option>
                <option value="locker3">Locker 3</option>
            </select>

            <label for="date">Start Date</label>
            <input type="date" id="date" name="startdate" required>

            <label for="date">End Date</label>
            <input type="date" id="date" name="enddate" required>

            <label for="notes">Additional Notes</label>
            <textarea id="notes" name="notes" rows="4" placeholder="Any special requests"></textarea>

            <button type="submit">Reserve Locker</button>
        </form>
    </div>
</body>
